<!DOCTYPE html>
<html lang="fi">

<head>
    <title>Lomake-esimerkki</title>
    <meta chardset="UTF-8">
    <link type="text/css" rel="stylesheet" href="css/tyylit.css">
</head>

<body>

    <form>
        <table>
            <tr>
                <td>
                    <fieldset>
                        <legend>Henkilötiedot</legend><!--Tekee viivan sisälle tekstin-->
                        <div>
                            <table>
                                <div>
                                    <label for="fname">Etunimi</label>
                </td>
                <input type="text" id="fname"></td>
                </div>
                <div>
                    <label for="lname">Sukunimi</label></td>
                    <input type="text" id="lname"></td>
                </div>
                <div>
                    <label for="password">Salasana</label></td>
                    <input type="password" id="password"></td>
                </div>
                </div>
        </table>
        </fieldset>
        </td>
        <td>
            <fieldset>
                <legend>Valinta</legend>
                <table>
                    <tr>
                        <td><input type="checkbox" id="emailselect"></td>
                        <td><label for="emailselect">Sähköposti</label></td>
                    </tr>
                    <tr>
                        <td><input type="checkbox" id="telselect"></td><!--tekee pienet boxit-->
                        <td><label for="telselect">Puhelin</label></td>
                    </tr>
                </table>
            </fieldset>
        </td>
        </tr>
        <tr>
            <td colspan="2">
                <fieldset>
                    <table>
                        <tr>
                            <td colspan="2"><!--tekee boxin leveyden kahteen sarakkeeseen-->
                                <textarea rows="10" cols="50"></textarea><!--tekee tekstikentän-->
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <input type="file" id="file"><!--tekee valitse tiedosto napin-->
                            </td>


                            <td>
                                <input type="submit" value="Lähetä"><!--tekee lähetä napin-->
                            </td>
                        </tr>
                    </table>

                </fieldset>
            </td>
        </tr>
        </table>
    </form>



</body>

</html>
