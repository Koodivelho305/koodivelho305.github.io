<body>

    <form>
        <div class="main-container">


            <fieldset class="row-container">
                <legend>Contact information:</legend><!--Tekee viivan sisälle tekstin-->
                <div class="container">

                    <div class="input-container">
                        <label for="fname">Firstname:</label>
                        <input type="text" id="fname">


                    </div>
                    <div class="input-container">
                        <label for="lname">Lastname:</label>
                        <input type="text" id="lname">

                    </div>

                    <div class="input-container">
                        <label for="emailselect">Email:</label>
                        <input type="email" id="email">

                    </div>


                    <div class="input-container">
                        <label for="telselect">Telephone:</label>
                        <input type="Telephone" id="Telephone"></label></td>
                    </div>
                </div>
                <div class="container">
                    <div class="input-container">
                        <label for="contact">Preferred contact method:</label>
                    </div>
                    <div class="input-container">
                        <input type="checkbox" id="emailselect">
                        <label for="emailselect">Email</label>

                    </div>
                    <div class="input-container">
                        <input type="checkbox" id="telselect"><!--tekee pienet boxit-->
                        <label for="telselect">Telephone</label>
                    </div>


                </div>
            </fieldset>

        </div>

        <div class="main-container">
            <div colspan="2">
                <fieldset class="row-container">
                    <legend>Feedback:</legend>
                    <div class="container">


                        <div class="input-container">
                            <label for="messagesubject">Message subject:</label>
                        </div>
                        <input type="Message" id="messagesubject">
                    </div>
                    <div class="input-container">
                        <div colspan="2"><!--tekee boxin leveyden kahteen sarakkeeseen-->
                            <textarea rows="15" cols="50"></textarea><!--tekee tekstikentän-->
                        </div>
                    </div>
                    <div class="input-container">
                        <label for="Filemessage">Attach a file:</label>
                        <input type="file" id="file"><!--tekee valitse tiedosto napin-->
                    </div>

                    <div class="input-container">
                        <input type="submit" value="Send"><!--tekee lähetä napin-->
                    </div>
                </fieldset>
            </div>
        </div>






    </form>
